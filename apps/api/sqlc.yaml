version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/features/assessments/queries.sql"
    schema: "../../supabase/migrations"
    gen:
      go:
        package: "assessmentsqlc"
        out: "internal/features/assessments/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        json_tags_case_style: "snake"
