name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: gofmt
        run: test -z "$(gofmt -l .)"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

  web-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # pnpm-lock.yaml is committed. Use --frozen-lockfile in CI.
      # If you intentionally need to update lockfile, run `pnpm install` locally and commit.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @vts-edu/web typecheck

      - name: Build
        run: pnpm --filter @vts-edu/web build

  generated-code-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Regenerate OpenAPI types
        run: pnpm api:types

      - name: Regenerate sqlc code
        run: pnpm api:sqlc

      - name: Verify generated code is up to date
        run: git diff --exit-code -- apps/web/src/shared/api/openapi-schema.d.ts apps/api/internal/features/*/sqlc/

  migration-validation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations
        run: |
          for f in supabase/migrations/*.sql; do
            echo "Applying ${f}"
            psql postgres://postgres:postgres@localhost:5434/postgres -v ON_ERROR_STOP=1 -f "${f}"
          done

      - name: Verify demo attempt
        run: |
          psql postgres://postgres:postgres@localhost:5434/postgres -v ON_ERROR_STOP=1 -c "
            SELECT id, status
            FROM attempts
            WHERE id = '00000000-0000-4000-8000-000000000001';
          "
