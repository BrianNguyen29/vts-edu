                $ref: '#/components/schemas/Enrollment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /classes/{class_id}/enrollments/bulk:
    post:
      operationId: academics.bulkEnrollStudents
      tags: [Academics]
      description: Admin only. Bulk enroll up to 100 students into a class. Set `dry_run` to validate without enrolling.
      parameters:
        - name: class_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkEnrollRequest'
      responses:
        '200':
          description: Dry-run validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkEnrollmentResult'
        '201':
          description: Students enrolled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkEnrollmentResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /classes/{class_id}/enrollments/{user_id}:
    delete:
      operationId: academics.unenrollStudent
      tags: [Academics]
      description: Admin only. Unenroll a student from a class.
      parameters:
        - name: class_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /classes/{class_id}/gradebook:
    get:
      operationId: gradebook.getClassGradebook
      tags: [Gradebook]
      description: Teacher or admin only. Gradebook for a class, with the latest attempt per student and assessment.
      parameters:
        - name: class_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Class gradebook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassGradebookList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /classes/{class_id}/gradebook/export:
    get:
      operationId: gradebook.exportClassGradebookCSV
      tags: [Gradebook]
      description: Teacher or admin only. CSV export of the class gradebook.
      parameters:
        - name: class_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: CSV export
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /resources:
    get:
      operationId: resources.list
      tags: [Resources]
      description: |
        List resources for the current organization.
        - Students receive only PUBLISHED resources.
        - Teachers and admins receive DRAFT and PUBLISHED resources.
      responses:
        '200':
          description: Resources visible to the caller
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: resources.create
      tags: [Resources]
      description: Teacher or admin only. Create a new resource in DRAFT status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResourceRequest'
      responses:
        '201':
          description: Resource created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /resources/{id}/publish:
    post:
      operationId: resources.publish
      tags: [Resources]
      description: Teacher or admin only. Transition a resource to PUBLISHED.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Resource published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /resources/{id}:
    delete:
      operationId: resources.archive
      tags: [Resources]
      description: Teacher or admin only. Archive a resource.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Resource archived
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /resources/{id}/files:
    post:
      operationId: resources.uploadFile
      tags: [Resources]
      description: |
        Teacher or admin only. Upload a file (multipart/form-data, field `file`)
        that becomes the active file for the resource. Replaces any existing
        ACTIVE file for the same resource. Capped by server `MAX_UPLOAD_SIZE`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: File stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceFile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          description: File exceeds MAX_UPLOAD_SIZE
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /resources/{id}/download:
    get:
      operationId: resources.downloadFile
      tags: [Resources]
      description: |
        Download the active file for a resource. Students may only download
        resources that are PUBLISHED. Teachers and admins may download any
        non-archived resource.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: File payload (octet-stream, attachment)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ListQuery:
      name: q
      in: query
      description: Case-insensitive search query.
      schema: { type: string }
    ListLimit:
      name: limit
      in: query
      description: Page size. When omitted the full list is returned.
      schema: { type: integer, minimum: 1 }
    ListOffset:
      name: offset
      in: query
      description: Number of rows to skip.
      schema: { type: integer, minimum: 0 }
    ListCursor:
      name: cursor
      in: query
      description: Opaque cursor for the next page. Resets offset to 0.
      schema: { type: string }
    ListCount:
      name: count
      in: query
      description: When true, include total_count in the page metadata.
      schema: { type: boolean }
  schemas:
    CsrfTokenResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [csrf_token]
          properties:
            csrf_token: { type: string }
    LoginRequest:
      type: object
      additionalProperties: false
      required: [organization_code, username, password]
      properties:
        organization_code: { type: string, minLength: 1, maxLength: 64 }
        username: { type: string, minLength: 1, maxLength: 128 }
        password: { type: string, minLength: 1, maxLength: 1024 }
    LoginResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [access_token, expires_in, user, roles, permissions, must_change_password]
          properties:
            access_token: { type: string }
            expires_in: { type: integer }
            user:
              type: object
              required: [id, display_name]
              properties:
                id: { type: string, format: uuid }
                display_name: { type: string }
            roles: { type: array, items: { type: string } }
            permissions: { type: array, items: { type: string } }
            must_change_password: { type: boolean }
    SuccessResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [success]
          properties:
            success: { type: boolean }
    ChangePasswordRequest:
      type: object
      additionalProperties: false
      required: [current_password, new_password]
      properties:
        current_password: { type: string, minLength: 1 }
        new_password:
          type: string
          minLength: 8
          description: Must contain at least one uppercase letter, one lowercase letter, one digit, and not match a common blocklist.
    MeResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, organization_id, display_name, roles, permissions, must_change_password]
          properties:
            id: { type: string, format: uuid }
            organization_id: { type: string, format: uuid }
            display_name: { type: string }
            roles: { type: array, items: { type: string } }
            permissions: { type: array, items: { type: string } }
            must_change_password: { type: boolean }
    AttemptSnapshot:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, organization_id, assessment_id, status, server_time, items]
          properties:
            id: { type: string, format: uuid }
            organization_id: { type: string, format: uuid }
            assessment_id: { type: string, format: uuid }
            publication_id: { type: string, format: uuid, nullable: true }
            status: { type: string, enum: [CREATED, IN_PROGRESS, SUBMITTED, EXPIRED, TERMINATED] }
            started_at: { type: string, format: date-time, nullable: true }
            expires_at: { type: string, format: date-time, nullable: true }
            submitted_at: { type: string, format: date-time, nullable: true }
            server_time: { type: string, format: date-time }
            items:
              type: array
              items:
                $ref: '#/components/schemas/AttemptItem'
    AttemptItem:
      type: object
      required: [id, question_version_id, position, points, prompt, choices]
      properties:
        id: { type: string, format: uuid }
        question_version_id: { type: string, format: uuid }
        position: { type: integer, minimum: 1 }
        points: { type: string }
        prompt: { type: object, additionalProperties: true, properties: { text: { type: string } } }
        choices: { type: array, items: { type: object, additionalProperties: true, properties: { id: { type: string }, text: { type: string } } } }
        answer:
          type: object
          required: [answer_payload, revision, answered_at]
          properties:
            answer_payload: { type: object, additionalProperties: true, properties: { selected_option: { type: string } } }
            revision: { type: integer, minimum: 1 }
            answered_at: { type: string, format: date-time }
    SaveAnswerRequest:
      type: object
      additionalProperties: false
      required: [answer_payload]
      properties:
        answer_payload: { type: object, additionalProperties: true, properties: { selected_option: { type: string } } }
    SaveAnswerResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [attempt_item_id, revision, answer_payload, answered_at]
          properties:
            attempt_item_id: { type: string, format: uuid }
            revision: { type: integer, minimum: 1 }
            answer_payload: { type: object, additionalProperties: true, properties: { selected_option: { type: string } } }
            answered_at: { type: string, format: date-time }
    AttemptSubmitted:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, status, submitted_at, score, max_score, grading_status]
          properties:
            id: { type: string, format: uuid }
            status: { type: string, enum: [SUBMITTED, EXPIRED] }
            submitted_at: { type: string, format: date-time }
            score: { type: string }
            max_score: { type: string }
            grading_status: { type: string, enum: [GRADED] }
    AssignedAssessmentList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AssignedAssessment'
    AssignedAssessment:
      type: object
      required: [id, title, status, availability, duration_minutes, max_attempts, attempts_used, revision, publication_id, published_at]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        status: { type: string, enum: [OPEN, PUBLISHED] }
        availability: { type: string, enum: [upcoming, open, closed] }
        duration_minutes: { type: integer, minimum: 1 }
        max_attempts: { type: integer, minimum: 1 }
        attempts_used: { type: integer, minimum: 0 }
        revision: { type: integer, minimum: 1 }
        publication_id: { type: string, format: uuid }
        published_at: { type: string, format: date-time }
        opens_at: { type: string, format: date-time, nullable: true }
        closes_at: { type: string, format: date-time, nullable: true }
    StudentAttemptList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/StudentAttempt'
        page:
          $ref: '#/components/schemas/PageInfo'
    StudentAttempt:
      type: object
      required: [id, assessment_id, assessment_title, status, started_at]
      properties:
        id: { type: string, format: uuid }
        assessment_id: { type: string, format: uuid }
        assessment_title: { type: string }
        status: { type: string, enum: [CREATED, IN_PROGRESS, SUBMITTED, EXPIRED, TERMINATED] }
        started_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time, nullable: true }
        submitted_at: { type: string, format: date-time, nullable: true }
        score: { type: string, nullable: true }
        max_score: { type: string, nullable: true }
        grading_status: { type: string, nullable: true }
    AttemptResult:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, assessment_id, status, server_time, items]
          properties:
            id: { type: string, format: uuid }
            assessment_id: { type: string, format: uuid }
            status: { type: string, enum: [SUBMITTED, EXPIRED] }
            submitted_at: { type: string, format: date-time }
            score: { type: string }
            max_score: { type: string }
            grading_status: { type: string, enum: [GRADED] }
            server_time: { type: string, format: date-time }
            items:
              type: array
              items:
                $ref: '#/components/schemas/AttemptResultItem'
    AttemptResultItem:
      type: object
      required: [id, question_version_id, position, points, prompt, choices, correct_answer, is_correct]
      properties:
        id: { type: string, format: uuid }
        question_version_id: { type: string, format: uuid }
        position: { type: integer, minimum: 1 }
        points: { type: string }
        prompt: { type: object, additionalProperties: true, properties: { text: { type: string } } }
        choices: { type: array, items: { type: object, additionalProperties: true, properties: { id: { type: string }, text: { type: string } } } }
        correct_answer: { type: object, additionalProperties: true }
        student_answer:
          type: object
          required: [answer_payload, answered_at]
          properties:
            answer_payload: { type: object, additionalProperties: true }
            answered_at: { type: string, format: date-time }
        is_correct: { type: boolean }
    PageInfo:
      type: object
      required: [limit, offset, has_more]
      properties:
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }
        next_cursor: { type: string }
        has_more: { type: boolean }
        total_count: { type: integer, minimum: 0 }
    AssessmentList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AssessmentListItem'
        page:
          $ref: '#/components/schemas/PageInfo'
    AssessmentListItem:
      type: object
      required: [id, title, status, duration_minutes]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        status: { type: string, enum: [OPEN, PUBLISHED] }
        duration_minutes: { type: integer, minimum: 1 }
    UserList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        page:
          $ref: '#/components/schemas/PageInfo'
    User:
      type: object
      required: [id, display_name, email, login_name, roles, must_change_password]
      properties:
        id: { type: string, format: uuid }
        display_name: { type: string }
        email: { type: string, nullable: true }
        login_name: { type: string }
        roles: { type: array, items: { type: string } }
        must_change_password: { type: boolean }
    CreateUserRequest:
      type: object
      additionalProperties: false
      required: [login_name, display_name, temporary_password, roles]
      properties:
        login_name: { type: string, minLength: 1, maxLength: 128 }
        display_name: { type: string, minLength: 1 }
        email: { type: string, nullable: true }
        temporary_password:
          type: string
          minLength: 8
          description: Must contain at least one uppercase letter, one lowercase letter, one digit, and not match a common blocklist.
        roles: { type: array, items: { type: string, enum: [student, teacher, admin] } }
    UpdateRolesRequest:
      type: object
      additionalProperties: false
      required: [roles]
      properties:
        roles: { type: array, items: { type: string, enum: [student, teacher, admin] } }
    ResetPasswordRequest:
      type: object
      additionalProperties: false
      required: [temporary_password]
      properties:
        temporary_password:
          type: string
          minLength: 8
          description: Must contain at least one uppercase letter, one lowercase letter, one digit, and not match a common blocklist.
    ImportUsersRequest:
      type: object
      additionalProperties: false
      required: [csv]
      properties:
        csv:
          type: string
          description: CSV text with header login_name,display_name,email,temporary_password,roles
        dry_run:
          type: boolean
          default: false
    ImportUserRow:
      type: object
      required: [row_number, login_name, status]
      properties:
        row_number: { type: integer }
        user_id: { type: string, format: uuid, nullable: true }
        login_name: { type: string }
        status: { type: string, enum: [valid, created, error] }
        error: { type: string, nullable: true }
    ImportUsersResult:
      type: object
      required: [total, created, failed, dry_run, rows]
      properties:
        total: { type: integer }
        created: { type: integer }
        failed: { type: integer }
        dry_run: { type: boolean }
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ImportUserRow'
    AuditLogList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        page:
          $ref: '#/components/schemas/PageInfo'
    AuditLog:
      type: object
      required: [id, actor_user_id, action, resource_type, resource_id, created_at]
      properties:
        id: { type: string, format: uuid }
        actor_user_id: { type: string, format: uuid }
        action: { type: string }
        resource_type: { type: string }
        resource_id: { type: string, format: uuid }
        before: { type: object, additionalProperties: true }
        after: { type: object, additionalProperties: true }
        metadata: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
    Organization:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, code, name]
          properties:
            id: { type: string, format: uuid }
            code: { type: string }
            name: { type: string }
    UpdateOrganizationRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
    Term:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, name, start_date, end_date, status]
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
            start_date: { type: string, format: date }
            end_date: { type: string, format: date }
            status: { type: string, enum: [ACTIVE, ARCHIVED] }
    TermList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            required: [id, name, start_date, end_date, status]
            properties:
              id: { type: string, format: uuid }
              name: { type: string }
              start_date: { type: string, format: date }
              end_date: { type: string, format: date }
              status: { type: string, enum: [ACTIVE, ARCHIVED] }
    CreateTermRequest:
      type: object
      additionalProperties: false
      required: [name, start_date, end_date]
      properties:
        name: { type: string, minLength: 1 }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
    Subject:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, code, name, status]
          properties:
            id: { type: string, format: uuid }
            code: { type: string }
            name: { type: string }
            description: { type: string, nullable: true }
            status: { type: string, enum: [ACTIVE, ARCHIVED] }
    SubjectList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            required: [id, code, name, status]
            properties:
              id: { type: string, format: uuid }
              code: { type: string }
              name: { type: string }
              description: { type: string, nullable: true }
              status: { type: string, enum: [ACTIVE, ARCHIVED] }
    CreateSubjectRequest:
      type: object
      additionalProperties: false
      required: [code, name]
      properties:
        code: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        description: { type: string, nullable: true }
    Course:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, subject_id, academic_term_id, code, name, status]
          properties:
            id: { type: string, format: uuid }
            subject_id: { type: string, format: uuid }
            academic_term_id: { type: string, format: uuid }
            code: { type: string }
            name: { type: string }
            status: { type: string, enum: [ACTIVE, ARCHIVED] }
    CourseList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            required: [id, subject_id, academic_term_id, code, name, status]
            properties:
              id: { type: string, format: uuid }
              subject_id: { type: string, format: uuid }
              academic_term_id: { type: string, format: uuid }
              code: { type: string }
              name: { type: string }
