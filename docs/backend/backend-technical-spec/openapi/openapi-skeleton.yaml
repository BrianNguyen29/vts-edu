openapi: 3.1.0
info:
  title: VTS EDU Backend API
  version: 0.2.0
  description: Product-ready core API for LMS and online assessments.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /auth/csrf-token:
    get:
      operationId: auth.csrfToken
      tags: [Auth]
      security: []
      responses:
        '200':
          description: CSRF token returned and set as cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrfTokenResponse'
  /auth/login:
    post:
      operationId: auth.login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success; refresh cookie set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/refresh:
    post:
      operationId: auth.refresh
      tags: [Auth]
      security: []
      description: Requires `vts_refresh` HttpOnly cookie and `X-CSRF-Token` header.
      responses:
        '200':
          description: Access token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      operationId: auth.logout
      tags: [Auth]
      security: []
      description: Requires `vts_refresh` HttpOnly cookie and `X-CSRF-Token` header.
      responses:
        '200':
          description: Logout success; refresh cookie cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
  /auth/change-password:
    post:
      operationId: auth.changePassword
      tags: [Auth]
      description: Requires Bearer access token and `X-CSRF-Token` header. Enforces password policy and rejects recently used passwords.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed; all refresh sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /me:
    get:
      operationId: me.get
      tags: [Auth]
      responses:
        '200':
          description: Current actor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/teaching/classes:
    get:
      operationId: academics.listMyTeachingClasses
      tags: [Academics]
      description: Teacher only. Returns the classes assigned to the current teacher with student and teacher counts.
      responses:
        '200':
          description: Class sections assigned to the teacher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSectionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /me/assessments:
    get:
      operationId: attempts.listAssignedAssessments
      tags: [Attempts]
      description: Student only. Returns the published/open assessments assigned to the current student.
      responses:
        '200':
          description: Assigned assessments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignedAssessmentList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /me/attempts:
    get:
      operationId: attempts.listAttemptHistory
      tags: [Attempts]
      description: Student only. Returns the current student's attempt history.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50 }
          description: Maximum number of attempts to return.
        - name: cursor
          in: query
          schema: { type: string }
          description: Opaque cursor for keyset pagination.
      responses:
        '200':
          description: Attempt history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentAttemptList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /assessments/{assessment_id}/attempts:
    post:
      operationId: attempts.start
      tags: [Attempts]
      description: Student only. Starts a new attempt or resumes an existing in-progress attempt for the assessment. Requires `X-CSRF-Token` header.
      parameters:
        - name: assessment_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '201':
          description: Attempt snapshot created or resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttemptSnapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /attempts/{attempt_id}:
    get:
      operationId: attempts.get
      tags: [Attempts]
      parameters:
        - name: attempt_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Attempt snapshot with item prompts and choices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttemptSnapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /attempts/{attempt_id}/answers/{attempt_item_id}:
    put:
      operationId: attempts.saveAnswer
      tags: [Attempts]
      description: Requires Bearer access token and `X-CSRF-Token` header.
      parameters:
        - name: attempt_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: attempt_item_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveAnswerRequest'
      responses:
        '200':
          description: Answer saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveAnswerResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /attempts/{attempt_id}/submit:
    post:
      operationId: attempts.submit
      tags: [Attempts]
      description: Requires Bearer access token and `X-CSRF-Token` header.
      parameters:
        - name: attempt_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Submitted and graded (MCQ) or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttemptSubmitted'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /attempts/{attempt_id}/result:
    get:
      operationId: attempts.getResult
      tags: [Attempts]
      description: Student only. Returns the graded result for a submitted or expired attempt.
      parameters:
        - name: attempt_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Attempt result with student answers and correct answers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttemptResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /assessments:
    get:
      operationId: assessments.list
      tags: [Assessments]
      description: Teacher or admin only. Optional case-insensitive title search and pagination.
      parameters:
        - $ref: '#/components/parameters/ListQuery'
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListOffset'
        - $ref: '#/components/parameters/ListCursor'
        - $ref: '#/components/parameters/ListCount'
      responses:
        '200':
          description: Published/open assessments for the current organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /users:
    get:
      operationId: users.list
      tags: [Admin]
      description: Admin only. Optional case-insensitive search on login name, display name, or email, plus pagination.
      parameters:
        - $ref: '#/components/parameters/ListQuery'
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListOffset'
        - $ref: '#/components/parameters/ListCursor'
        - $ref: '#/components/parameters/ListCount'
      responses:
        '200':
          description: Users in the current organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: users.create
      tags: [Admin]
      description: Admin only. Requires `X-CSRF-Token` header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /users/{user_id}/roles:
    put:
      operationId: users.updateRoles
      tags: [Admin]
      description: Admin only. Requires `X-CSRF-Token` header.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRolesRequest'
      responses:
        '200':
          description: Roles updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /users/{user_id}/reset-password:
    post:
      operationId: users.resetPassword
      tags: [Admin]
      description: Admin only. Requires `X-CSRF-Token` header.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /users/imports:
    post:
      operationId: users.import
      tags: [Admin]
      description: Admin only. Import up to 100 users from a CSV string. Set `dry_run` to validate without creating.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportUsersRequest'
      responses:
        '200':
          description: Dry-run validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportUsersResult'
        '201':
          description: Users imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportUsersResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /organizations/current:
    get:
      operationId: organizations.getCurrent
      tags: [Admin]
      description: Admin only.
      responses:
        '200':
          description: Current organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      operationId: organizations.updateCurrent
      tags: [Admin]
      description: Admin only. Requires `X-CSRF-Token` header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationRequest'
      responses:
        '200':
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /audit-logs:
    get:
      operationId: auditLogs.list
      tags: [Admin]
      description: Admin only. List audit logs for the current organization, optionally filtered.
      parameters:
        - name: action
          in: query
          description: Filter by action name.
          schema: { type: string }
        - name: actor_user_id
          in: query
          description: Filter by actor user ID.
          schema: { type: string, format: uuid }
        - name: from
          in: query
          description: Start timestamp (RFC3339).
          schema: { type: string, format: date-time }
        - name: to
          in: query
          description: End timestamp (RFC3339).
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListOffset'
        - $ref: '#/components/parameters/ListCursor'
        - $ref: '#/components/parameters/ListCount'
      responses:
        '200':
          description: Audit logs for the current organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /audit-logs/export:
    get:
      operationId: auditLogs.export
      tags: [Admin]
      description: Admin only. Export audit logs for the current organization as CSV.
      parameters:
        - name: action
          in: query
          description: Filter by action name.
          schema: { type: string }
        - name: actor_user_id
          in: query
          description: Filter by actor user ID.
          schema: { type: string, format: uuid }
        - name: from
          in: query
          description: Start timestamp (RFC3339).
          schema: { type: string, format: date-time }
        - name: to
          in: query
          description: End timestamp (RFC3339).
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: CSV export of audit logs
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /academic-terms:
    get:
      operationId: academics.listTerms
      tags: [Academics]
      description: Teacher or admin only. List active academic terms.
      responses:
        '200':
          description: Academic terms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TermList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: academics.createTerm
      tags: [Academics]
      description: Admin only. Requires `X-CSRF-Token` header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTermRequest'
      responses:
        '201':
          description: Term created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Term'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /academic-terms/{term_id}:
    patch:
      operationId: academics.updateTerm
      tags: [Academics]
      description: Admin only. Update an academic term. Requires `X-CSRF-Token` header.
      parameters:
        - name: term_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTermRequest'
      responses:
        '200':
          description: Term updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Term'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: academics.archiveTerm
      tags: [Academics]
      description: Admin only. Archive an academic term.
      parameters:
        - name: term_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /subjects:
    get:
      operationId: academics.listSubjects
      tags: [Academics]
      description: Teacher or admin only. List active subjects.
      responses:
        '200':
          description: Subjects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubjectList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: academics.createSubject
      tags: [Academics]
      description: Admin only. Requires `X-CSRF-Token` header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubjectRequest'
      responses:
        '201':
          description: Subject created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /subjects/{subject_id}:
    patch:
      operationId: academics.updateSubject
      tags: [Academics]
      description: Admin only. Update a subject. Requires `X-CSRF-Token` header.
      parameters:
        - name: subject_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubjectRequest'
      responses:
        '200':
          description: Subject updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      operationId: academics.archiveSubject
      tags: [Academics]
      description: Admin only. Archive a subject.
      parameters:
        - name: subject_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /courses:
    get:
      operationId: academics.listCourses
      tags: [Academics]
      description: Teacher or admin only. List active courses.
      responses:
        '200':
          description: Courses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: academics.createCourse
      tags: [Academics]
      description: Admin only. Requires `X-CSRF-Token` header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseRequest'
      responses:
        '201':
          description: Course created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /courses/{course_id}:
    patch:
      operationId: academics.updateCourse
      tags: [Academics]
      description: Admin only. Update a course. Requires `X-CSRF-Token` header.
      parameters:
        - name: course_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCourseRequest'
      responses:
        '200':
          description: Course updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      operationId: academics.archiveCourse
      tags: [Academics]
      description: Admin only. Archive a course.
      parameters:
        - name: course_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /classes:
    get:
      operationId: academics.listClasses
      tags: [Academics]
      description: Teacher or admin only. Teachers see assigned classes; admins see all.
      responses:
        '200':
          description: Class sections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSectionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: academics.createClass
      tags: [Academics]
      description: Admin only. Requires `X-CSRF-Token` header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClassRequest'
      responses:
        '201':
          description: Class section created
