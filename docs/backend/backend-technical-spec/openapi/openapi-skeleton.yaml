openapi: 3.1.0
info:
  title: VTS EDU Backend API
  version: 0.2.0
  description: Product-ready core API for LMS and online assessments.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /auth/csrf-token:
    get:
      operationId: auth.csrfToken
      tags: [Auth]
      security: []
      responses:
        '200':
          description: CSRF token returned and set as cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsrfTokenResponse'
  /auth/login:
    post:
      operationId: auth.login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success; refresh cookie set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/refresh:
    post:
      operationId: auth.refresh
      tags: [Auth]
      security: []
      description: Requires `vts_refresh` HttpOnly cookie and `X-CSRF-Token` header.
      responses:
        '200':
          description: Access token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      operationId: auth.logout
      tags: [Auth]
      security: []
      description: Requires `vts_refresh` HttpOnly cookie and `X-CSRF-Token` header.
      responses:
        '200':
          description: Logout success; refresh cookie cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
  /auth/change-password:
    post:
      operationId: auth.changePassword
      tags: [Auth]
      description: Requires Bearer access token and `X-CSRF-Token` header. Enforces password policy and rejects recently used passwords.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed; all refresh sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /me:
    get:
      operationId: me.get
      tags: [Auth]
      responses:
        '200':
          description: Current actor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/teaching/classes:
    get:
      operationId: academics.listMyTeachingClasses
      tags: [Academics]
      description: Teacher only. Returns the classes assigned to the current teacher with student and teacher counts.
      responses:
        '200':
          description: Class sections assigned to the teacher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSectionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /attempts/{attempt_id}:
    get:
      operationId: attempts.get
      tags: [Attempts]
      parameters:
        - name: attempt_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Attempt snapshot with item prompts and choices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttemptSnapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /attempts/{attempt_id}/answers/{attempt_item_id}:
    put:
      operationId: attempts.saveAnswer
      tags: [Attempts]
      description: Requires Bearer access token and `X-CSRF-Token` header.
      parameters:
        - name: attempt_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: attempt_item_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveAnswerRequest'
      responses:
        '200':
          description: Answer saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveAnswerResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /attempts/{attempt_id}/submit:
    post:
      operationId: attempts.submit
      tags: [Attempts]
      description: Requires Bearer access token and `X-CSRF-Token` header.
      parameters:
        - name: attempt_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Submitted and graded (MCQ) or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttemptSubmitted'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /assessments:
    get:
      operationId: assessments.list
      tags: [Assessments]
      description: Teacher or admin only. Optional case-insensitive title search and pagination.
      parameters:
        - $ref: '#/components/parameters/ListQuery'
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListOffset'
        - $ref: '#/components/parameters/ListCursor'
        - $ref: '#/components/parameters/ListCount'
      responses:
        '200':
          description: Published/open assessments for the current organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /users:
    get:
      operationId: users.list
      tags: [Admin]
      description: Admin only. Optional case-insensitive search on login name, display name, or email, plus pagination.
      parameters:
        - $ref: '#/components/parameters/ListQuery'
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListOffset'
        - $ref: '#/components/parameters/ListCursor'
        - $ref: '#/components/parameters/ListCount'
      responses:
        '200':
          description: Users in the current organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: users.create
      tags: [Admin]
      description: Admin only. Requires `X-CSRF-Token` header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /users/{user_id}/roles:
    put:
      operationId: users.updateRoles
      tags: [Admin]
      description: Admin only. Requires `X-CSRF-Token` header.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRolesRequest'
      responses:
        '200':
          description: Roles updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /users/{user_id}/reset-password:
    post:
      operationId: users.resetPassword
      tags: [Admin]
      description: Admin only. Requires `X-CSRF-Token` header.
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /organizations/current:
    get:
      operationId: organizations.getCurrent
      tags: [Admin]
      description: Admin only.
      responses:
        '200':
          description: Current organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      operationId: organizations.updateCurrent
      tags: [Admin]
      description: Admin only. Requires `X-CSRF-Token` header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationRequest'
      responses:
        '200':
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /audit-logs:
    get:
      operationId: auditLogs.list
      tags: [Admin]
      description: Admin only. List audit logs for the current organization, optionally filtered.
      parameters:
        - name: action
          in: query
          description: Filter by action name.
          schema: { type: string }
        - name: actor_user_id
          in: query
          description: Filter by actor user ID.
          schema: { type: string, format: uuid }
        - name: from
          in: query
          description: Start timestamp (RFC3339).
          schema: { type: string, format: date-time }
        - name: to
          in: query
          description: End timestamp (RFC3339).
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/ListLimit'
        - $ref: '#/components/parameters/ListOffset'
        - $ref: '#/components/parameters/ListCursor'
        - $ref: '#/components/parameters/ListCount'
      responses:
        '200':
          description: Audit logs for the current organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /academic-terms:
    get:
      operationId: academics.listTerms
      tags: [Academics]
      description: Teacher or admin only. List active academic terms.
      responses:
        '200':
          description: Academic terms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TermList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: academics.createTerm
      tags: [Academics]
      description: Admin only. Requires `X-CSRF-Token` header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTermRequest'
      responses:
        '201':
          description: Term created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Term'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /academic-terms/{term_id}:
    delete:
      operationId: academics.archiveTerm
      tags: [Academics]
      description: Admin only. Archive an academic term.
      parameters:
        - name: term_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /subjects:
    get:
      operationId: academics.listSubjects
      tags: [Academics]
      description: Teacher or admin only. List active subjects.
      responses:
        '200':
          description: Subjects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubjectList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: academics.createSubject
      tags: [Academics]
      description: Admin only. Requires `X-CSRF-Token` header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubjectRequest'
      responses:
        '201':
          description: Subject created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /subjects/{subject_id}:
    delete:
      operationId: academics.archiveSubject
      tags: [Academics]
      description: Admin only. Archive a subject.
      parameters:
        - name: subject_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /courses:
    get:
      operationId: academics.listCourses
      tags: [Academics]
      description: Teacher or admin only. List active courses.
      responses:
        '200':
          description: Courses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: academics.createCourse
      tags: [Academics]
      description: Admin only. Requires `X-CSRF-Token` header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseRequest'
      responses:
        '201':
          description: Course created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /courses/{course_id}:
    delete:
      operationId: academics.archiveCourse
      tags: [Academics]
      description: Admin only. Archive a course.
      parameters:
        - name: course_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /classes:
    get:
      operationId: academics.listClasses
      tags: [Academics]
      description: Teacher or admin only. Teachers see assigned classes; admins see all.
      responses:
        '200':
          description: Class sections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSectionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: academics.createClass
      tags: [Academics]
      description: Admin only. Requires `X-CSRF-Token` header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClassRequest'
      responses:
        '201':
          description: Class section created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassSection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /classes/{class_id}:
    delete:
      operationId: academics.archiveClass
      tags: [Academics]
      description: Admin only. Archive a class section.
      parameters:
        - name: class_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /classes/{class_id}/assessments:
    get:
      operationId: assessments.listByClass
      tags: [Assessments]
      description: Teacher or admin only. List assessments targeting the class.
      parameters:
        - name: class_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Assessments for the class
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: assessments.createForClass
      tags: [Assessments]
      description: Teacher or admin only. Create a draft assessment for the class. Requires `X-CSRF-Token` header.
      parameters:
        - name: class_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssessmentRequest'
      responses:
        '201':
          description: Draft assessment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /assessments/{id}:
    get:
      operationId: assessments.get
      tags: [Assessments]
      description: Teacher or admin only. Get assessment builder details including sections, items, and targets.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Assessment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: assessments.update
      tags: [Assessments]
      description: Teacher or admin only. Update draft assessment settings. Requires `X-CSRF-Token` header.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssessmentRequest'
      responses:
        '200':
          description: Assessment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /assessments/{id}/sections:
    post:
      operationId: assessments.createSection
      tags: [Assessments]
      description: Teacher or admin only. Add a section to a draft assessment. Requires `X-CSRF-Token` header.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSectionRequest'
      responses:
        '201':
          description: Section created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Section'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /assessment-sections/{section_id}/items:
    post:
      operationId: assessments.createItem
      tags: [Assessments]
      description: Teacher or admin only. Add an item from a question version to a section. Requires `X-CSRF-Token` header.
      parameters:
        - name: section_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /assessments/{id}/targets:
    post:
      operationId: assessments.createTarget
      tags: [Assessments]
      description: Teacher or admin only. Target a class section for the assessment. Requires `X-CSRF-Token` header.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTargetRequest'
      responses:
        '201':
          description: Target created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Target'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /assessments/{id}/validate:
    post:
      operationId: assessments.validate
      tags: [Assessments]
      description: Teacher or admin only. Validate that the assessment is ready to publish.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
