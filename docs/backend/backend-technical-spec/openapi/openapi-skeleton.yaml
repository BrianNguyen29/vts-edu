components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ListQuery:
      name: q
      in: query
      description: Case-insensitive search query.
      schema: { type: string }
    ListLimit:
      name: limit
      in: query
      description: Page size. When omitted the full list is returned.
      schema: { type: integer, minimum: 1 }
    ListOffset:
      name: offset
      in: query
      description: Number of rows to skip.
      schema: { type: integer, minimum: 0 }
    ListCursor:
      name: cursor
      in: query
      description: Opaque cursor for the next page. Resets offset to 0.
      schema: { type: string }
    ListCount:
      name: count
      in: query
      description: When true, include total_count in the page metadata.
      schema: { type: boolean }
  schemas:
    CsrfTokenResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [csrf_token]
          properties:
            csrf_token: { type: string }
    LoginRequest:
      type: object
      additionalProperties: false
      required: [organization_code, username, password]
      properties:
        organization_code: { type: string, minLength: 1, maxLength: 64 }
        username: { type: string, minLength: 1, maxLength: 128 }
        password: { type: string, minLength: 1, maxLength: 1024 }
    LoginResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [access_token, expires_in, user, roles, permissions, must_change_password]
          properties:
            access_token: { type: string }
            expires_in: { type: integer }
            user:
              type: object
              required: [id, display_name]
              properties:
                id: { type: string, format: uuid }
                display_name: { type: string }
            roles: { type: array, items: { type: string } }
            permissions: { type: array, items: { type: string } }
            must_change_password: { type: boolean }
    SuccessResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [success]
          properties:
            success: { type: boolean }
    ChangePasswordRequest:
      type: object
      additionalProperties: false
      required: [current_password, new_password]
      properties:
        current_password: { type: string, minLength: 1 }
        new_password:
          type: string
          minLength: 8
          description: Must contain at least one uppercase letter, one lowercase letter, one digit, and not match a common blocklist.
    MeResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, organization_id, display_name, roles, permissions, must_change_password]
          properties:
            id: { type: string, format: uuid }
            organization_id: { type: string, format: uuid }
            display_name: { type: string }
            roles: { type: array, items: { type: string } }
            permissions: { type: array, items: { type: string } }
            must_change_password: { type: boolean }
    AttemptSnapshot:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, organization_id, assessment_id, status, items]
          properties:
            id: { type: string, format: uuid }
            organization_id: { type: string, format: uuid }
            assessment_id: { type: string, format: uuid }
            publication_id: { type: string, format: uuid, nullable: true }
            status: { type: string, enum: [CREATED, IN_PROGRESS, SUBMITTED, EXPIRED, TERMINATED] }
            started_at: { type: string, format: date-time, nullable: true }
            expires_at: { type: string, format: date-time, nullable: true }
            submitted_at: { type: string, format: date-time, nullable: true }
            items:
              type: array
              items:
                $ref: '#/components/schemas/AttemptItem'
    AttemptItem:
      type: object
      required: [id, question_version_id, position, points, prompt, choices]
      properties:
        id: { type: string, format: uuid }
        question_version_id: { type: string, format: uuid }
        position: { type: integer, minimum: 1 }
        points: { type: string }
        prompt: { type: object, additionalProperties: true, properties: { text: { type: string } } }
        choices: { type: array, items: { type: object, additionalProperties: true, properties: { id: { type: string }, text: { type: string } } } }
        answer:
          type: object
          required: [answer_payload, revision, answered_at]
          properties:
            answer_payload: { type: object, additionalProperties: true, properties: { selected_option: { type: string } } }
            revision: { type: integer, minimum: 1 }
            answered_at: { type: string, format: date-time }
    SaveAnswerRequest:
      type: object
      additionalProperties: false
      required: [answer_payload]
      properties:
        answer_payload: { type: object, additionalProperties: true, properties: { selected_option: { type: string } } }
    SaveAnswerResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [attempt_item_id, revision, answer_payload, answered_at]
          properties:
            attempt_item_id: { type: string, format: uuid }
            revision: { type: integer, minimum: 1 }
            answer_payload: { type: object, additionalProperties: true, properties: { selected_option: { type: string } } }
            answered_at: { type: string, format: date-time }
    AttemptSubmitted:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, status, submitted_at, score, max_score, grading_status]
          properties:
            id: { type: string, format: uuid }
            status: { type: string, enum: [SUBMITTED, EXPIRED] }
            submitted_at: { type: string, format: date-time }
            score: { type: string }
            max_score: { type: string }
            grading_status: { type: string, enum: [GRADED] }
    PageInfo:
      type: object
      required: [limit, offset, has_more]
      properties:
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }
        next_cursor: { type: string }
        has_more: { type: boolean }
        total_count: { type: integer, minimum: 0 }
    AssessmentList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AssessmentListItem'
        page:
          $ref: '#/components/schemas/PageInfo'
    AssessmentListItem:
      type: object
      required: [id, title, status, duration_minutes]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        status: { type: string, enum: [OPEN, PUBLISHED] }
        duration_minutes: { type: integer, minimum: 1 }
    UserList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        page:
          $ref: '#/components/schemas/PageInfo'
    User:
      type: object
      required: [id, display_name, email, login_name, roles, must_change_password]
      properties:
        id: { type: string, format: uuid }
        display_name: { type: string }
        email: { type: string, nullable: true }
        login_name: { type: string }
        roles: { type: array, items: { type: string } }
        must_change_password: { type: boolean }
    CreateUserRequest:
      type: object
      additionalProperties: false
      required: [login_name, display_name, temporary_password, roles]
      properties:
        login_name: { type: string, minLength: 1, maxLength: 128 }
        display_name: { type: string, minLength: 1 }
        email: { type: string, nullable: true }
        temporary_password:
          type: string
          minLength: 8
          description: Must contain at least one uppercase letter, one lowercase letter, one digit, and not match a common blocklist.
        roles: { type: array, items: { type: string, enum: [student, teacher, admin] } }
    UpdateRolesRequest:
      type: object
      additionalProperties: false
      required: [roles]
      properties:
        roles: { type: array, items: { type: string, enum: [student, teacher, admin] } }
    ResetPasswordRequest:
