      required: [class_section_id]
      properties:
        class_section_id: { type: string, format: uuid }
    ValidationResult:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [valid]
          properties:
            valid: { type: boolean }
            errors:
              type: array
              items:
                type: object
                required: [field, message]
                properties:
                  field: { type: string }
                  message: { type: string }
    PublishResult:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, status, revision]
          properties:
            id: { type: string, format: uuid }
            status: { type: string, enum: [OPEN, PUBLISHED, CLOSED] }
            revision: { type: integer, minimum: 1 }
            published_at: { type: string, format: date-time }
    Problem:
      type: object
      required: [title, status, code]
      properties:
        type: { type: string, format: uri-reference }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        request_id: { type: string }
  responses:
    Unauthorized:
      description: Authentication required or invalid
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Insufficient permissions or invalid CSRF token
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    BadRequest:
      description: Invalid request body
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Resource conflict or attempt not in progress/expired
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    SuccessResponse:
      description: Operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    TooManyRequests:
      description: Rate limit or temporary account lockout exceeded
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
